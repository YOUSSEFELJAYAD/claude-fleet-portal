<title>lottie preview grid</title>
<style>

  h2{color:#ffb000;font-size:14px;letter-spacing:.1em;margin:18px 0 8px}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .cell{border:1px solid rgba(255,255,255,.1);border-radius:10px;background:#101217;padding:6px;text-align:center}
  .cell .lbl{color:#ffb000;font-weight:bold}
  .cell .u{color:#5b626d;font-size:9px;word-break:break-all;line-height:1.2}
  dotlottie-player{width:100%;height:150px}
</style>
<script type="module" src="https://cdn.jsdelivr.net/npm/@dotlottie/player-component@2.7.12/dist/dotlottie-player.mjs"></script>
</head><body>
