name: release

# Fully automated release: push a version tag (vX.Y.Z) and GitHub does the rest —
#   1. test    — server suite + typecheck across the workspace
#   2. release — create the GitHub release with auto-generated notes (if not already created)
#   3. desktop — build installers for macOS / Windows / Linux and attach them to the release
# All run: commands are static; the only interpolations are trusted contexts (tag name, secrets).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # create the release + upload installer assets

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm test

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create the release if it doesn't exist (auto-generated notes)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "Claude Fleet Portal $TAG" --generate-notes

  desktop:
    needs: [test, release]
    # tag pushes wait for the release job (so auto-notes land first); manual dispatch runs
    # skip the release job and upload to the existing release for this version.
    if: always() && needs.test.result == 'success' && (needs.release.result == 'success' || needs.release.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Build web (standalone for desktop)
        run: pnpm build
        env:
          FLEET_STANDALONE: '1'
      - name: Install desktop dependencies
        run: npm install
        working-directory: desktop
      - name: Bundle server + assemble web payload
        run: npm run prepare:app
        working-directory: desktop
      # electron-builder publishes installers to the GitHub release matching `v${package.json version}`.
      # desktop/package.json drifts behind the tags (it sat at 0.4.5 while tags reached v0.6.0), so every
      # build since v0.5.0 silently re-uploaded onto the stale v0.4.5 release and the real tags got 0 assets.
      # Pin the version to the tag being built so the upload lands on the correct release. (Tag pushes only;
      # manual workflow_dispatch keeps the committed version, which it expects to match an existing release.)
      - name: Sync desktop version to the release tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash # ${TAG#v} is a bash-ism; windows-latest defaults run: steps to PowerShell
        env:
          TAG: ${{ github.ref_name }}
        run: npm version "${TAG#v}" --no-git-tag-version --allow-same-version
        working-directory: desktop
      - name: Build installers and attach to the release
        run: npx electron-builder --publish always
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
